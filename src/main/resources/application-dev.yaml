spring:
  application:
    name: tickets-api
  datasource:
    url: jdbc:h2:mem:uifce_support;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  logging:
    level:
      security: DEBUG
      SQL: DEBUG
  data:
    web:
      pageable:
        serialization-mode: via_dto
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: 719269115512-eom0psag4ertk4pvufahurt6sk4eijkt.apps.googleusercontent.com
            client-secret: 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
            scope:
              - email
              - profile
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub
